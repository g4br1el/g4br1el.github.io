<div class="pub-item">
    <span class="pub-reference">{{ reference | replace_first: ']', '] ' }}</span>
    <div class="pub-links">
        {% if entry.pdf %}
        <a href="{{ site.baseurl }}/pdf/{{ entry.pdf }}">PDF</a>
        {% endif %}
        {% if entry.arxiv %}
        <a href="https://arxiv.org/abs/{{ entry.arxiv }}">arXiv</a>
        {% endif %}
        {% if entry.doi %}
        <a href="https://doi.org/{{ entry.doi }}">DOI</a>
        {% endif %}
        {% if entry.url %}
        <a href="{{ entry.url }}">URL</a>
        {% endif %}
        {% if entry.code %}
        <a href="{{ entry.code }}">Code</a>
        {% endif %}
        <a href="#" onclick="toggleBibtex('{{ entry.key }}'); return false;">BibTeX</a>
    </div>
    <div id="bib-{{ entry.key }}" class="bib-entry" style="display: none;">
        <pre>{{ entry.bibtex }}</pre>
    </div>
</div>

<script>
    function toggleBibtex(key) {
        var x = document.getElementById('bib-' + key);
        x.style.display = (x.style.display === 'none') ? 'block' : 'none';
    }
</script>

# .github/workflows/deploy.yml
# Triggers on push to `source`, builds Jekyll 4, deploys _site/ to `main`

name: Build & Deploy Jekyll

on:
  push:
    branches: [source]

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: source

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true  # caches gems automatically

      - name: Build site
        run: |
          bundle exec jekyll build --baseurl ""
        env:
          JEKYLL_ENV: production

      - name: Deploy to main
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: main
          publish_dir: ./_site
          force_orphan: true  # keeps main clean, no history bloat
          cname: www.gabrieldax.de